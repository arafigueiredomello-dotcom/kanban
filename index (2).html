<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ══════════════════════════════════════════════
// SUAS CREDENCIAIS DO FIREBASE
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCfIwQI5ZrIvqOZhRZyGu0cCfQMJ6KEwj4",
  authDomain: "kanban-tori.firebaseapp.com",
  databaseURL: "https://kanban-tori-default-rtdb.firebaseio.com",
  projectId: "kanban-tori",
  storageBucket: "kanban-tori.firebasestorage.app",
  messagingSenderId: "735996772849",
  appId: "1:735996772849:web:3e4afcd47cd69a21d24450",
  measurementId: "G-P7E4DFM2L8"
};
// ══════════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;
let remoteData = null;
let isSaving = false;
let pendingSave = null;

// ── AUTH STATE ──
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    showApp(user);
    startListening();
  } else {
    currentUser = null;
    showLogin();
  }
});

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}

function showApp(user) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('userEmail').textContent = user.email;
}

// ── FIREBASE LOGIN ──
window.doLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginError');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Entrando…';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    const msgs = {
      'auth/user-not-found': 'Usuário não encontrado.',
      'auth/wrong-password': 'Senha incorreta.',
      'auth/invalid-email': 'E-mail inválido.',
      'auth/invalid-credential': 'E-mail ou senha incorretos.',
      'auth/too-many-requests': 'Muitas tentativas. Tente mais tarde.'
    };
    err.textContent = msgs[e.code] || 'Erro ao entrar. Verifique suas credenciais.';
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
};

window.doLogout = async function() {
  await signOut(auth);
};

// Permitir Enter no login
window.loginKeydown = function(e) {
  if (e.key === 'Enter') window.doLogin();
};

// Firebase salva arrays como objetos {0:..., 1:...} — converte de volta pra array
function toArr(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  return Object.values(val);
}

function normalizeFirebase(val) {
  const d = JSON.parse(JSON.stringify(val));
  d.boards = toArr(d.boards);
  if (!d.cols) d.cols = {};
  Object.keys(d.cols).forEach(boardId => {
    d.cols[boardId] = toArr(d.cols[boardId]);
    d.cols[boardId].forEach(col => {
      col.cards = toArr(col.cards);
      col.cards.forEach(card => {
        if (card.history) card.history = toArr(card.history);
      });
    });
  });
  return d;
}

// ── FIREBASE SYNC ──
function startListening() {
  const dbRef = ref(db, 'kanban');
  onValue(dbRef, snapshot => {
    const val = snapshot.val();
    if (val) {
      remoteData = val;
      if (!isSaving) {
        data = normalizeFirebase(val);
        data.cardForms = {};
        data.addColForm = false;
        data.showNewBoard = false;
        data.newBoardName = '';
        data.newColName = '';
        if (!data.boards || data.boards.length === 0) {
          data.boards = JSON.parse(JSON.stringify(INITIAL_DATA.boards));
        }
        data.boards.forEach(b => {
          if (!data.cols[b.id]) data.cols[b.id] = [];
        });
        if (!data.activeBoard || !data.boards.find(b => b.id === data.activeBoard)) {
          data.activeBoard = data.boards[0].id;
        }
        render();
      }
    } else {
      data = JSON.parse(JSON.stringify(INITIAL_DATA));
      saveToFirebase();
      render();
    }
  });
}

function saveToFirebase() {
  if (isSaving) {
    pendingSave = true;
    return;
  }
  isSaving = true;
  const toSave = {
    boards: data.boards,
    activeBoard: data.activeBoard,
    cols: data.cols
  };
  set(ref(db, 'kanban'), toSave).then(() => {
    isSaving = false;
    if (pendingSave) {
      pendingSave = false;
      saveToFirebase();
    }
  }).catch(err => {
    isSaving = false;
    console.error('Erro ao salvar:', err);
  });
}

// Expõe para o código legado
window._firebaseSave = saveToFirebase;
window._firebaseUser = () => currentUser;

// Salva posições no Firebase
window._firebaseSavePosicoes = function(nova) {
  set(ref(db, 'posicoes'), nova).catch(err => console.error('Erro ao salvar posições:', err));
};

// Carrega posições do Firebase ao iniciar
onValue(ref(db, 'posicoes'), snapshot => {
  const val = snapshot.val();
  if (val && typeof val === 'object' && Object.keys(val).length > 0) {
    posicoes = val;
    const total = Object.keys(val).length;
    const badge = document.getElementById('posicoesBadge');
    if (badge) {
      badge.style.display = 'inline-block';
      badge.textContent = '📊 ' + total + ' clientes';
    }
  }
});


</script>
<style>

    font-weight: 600;
    letter-spacing: -0.4px;

  }

  .login-subtitle {
    font-size: 13px;
    color: var(--text2);

    font-size: 11px;
    font-weight: 600;

  .login-input {
    width: 100%;
    padding: 9px 12px;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    outline: none;
    font-family: 'DM Sans', sans-serif;
    transition: border-color .15s;
  }
  .login-input:focus { border-color: var(--border2); background: var(--surface); }

  .login-btn {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;

    font-family: 'DM Sans', sans-serif;

  }

  .login-btn:disabled { opacity: .45; cursor: default; }

  .login-error {

    border-radius: var(--radius-sm);

  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 0;

  }

  .topbar-logo {
    font-size: 15px;

    color: var(--text);

  }

  .board-tabs {
    display: flex;

    gap: 2px;

    overflow-x: auto;

  .board-tab {

  .topbar-right {

    gap: 8px;

  .user-badge {
    font-size: 12px;

  /* SYNC INDICATOR */

  /* BOARD */

  }

  /* CARDS AREA */
  .cards-area {
    padding: 0 8px 8px;
    min-height: 40px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    cursor: grab;
    position: relative;
    transition: border-color .15s, box-shadow .15s, opacity .15s;

  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:active { cursor: grabbing; }
  .card.dragging { opacity: .35; box-shadow: none; }
  .card.drag-over { border-color: var(--border2); box-shadow: 0 0 0 2px var(--border2); }

  .card.op-aplicacao  { background: #f0faf4; border-color: #a8d9b8; }
  .card.op-aplicacao:hover  { border-color: #6dbf8a; }
  .card.op-resgate_total  { background: #fff5f5; border-color: #f5b8b8; }

    border-radius: var(--radius-sm);

    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* TAG COLORS */
  .tag-slate  { background: #f0efe9; color: #5a5850; }
  .tag-blue   { background: #e8f0fc; color: #2d5fa8; }
  .tag-green  { background: #e6f4ec; color: #1e6e42; }
  .tag-amber  { background: #fef3e2; color: #8a5e1a; }
  .tag-red    { background: #fde8e8; color: #b94040; }
  .tag-purple { background: #f0eafc; color: #6b3ea8; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 32px 20px;
    color: var(--text3);
    font-size: 12px;
    line-height: 1.6;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.3);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px;
    width: 380px;
    max-width: 90vw;
    box-shadow: var(--shadow-md);
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h3 { font-size: 15px; font-weight: 500; }

  .modal input,
  .modal textarea,
  .modal select {
    width: 100%;
    font-size: 13px;

/* ── FERIADOS E DATAS ── */
function getEaster(year) {
  const a = year % 19, b = Math.floor(year / 100), c = year % 100;
  const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3), h = (19*a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4;
  const l = (32 + 2*e + 2*i - h - k) % 7;
  const m = Math.floor((a + 11*h + 22*l) / 451);
  const month = Math.floor((h + l - 7*m + 114) / 31);
  const day   = ((h + l - 7*m + 114) % 31) + 1;
  return new Date(year, month - 1, day);
}

function getHolidays(year) {
  const easter = getEaster(year);
  const add = (d, days) => { const r = new Date(d); r.setDate(r.getDate() + days); return r; };
  const fmt  = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const fixed = [
    `${year}-01-01`, `${year}-04-21`, `${year}-05-01`,
    `${year}-09-07`, `${year}-10-12`, `${year}-11-02`,
    `${year}-11-15`, `${year}-11-20`, `${year}-12-25`
  ];
  const mobile = [
    fmt(add(easter, -48)),
    fmt(add(easter, -47)),
    fmt(add(easter, -2)),
    fmt(easter),
    fmt(add(easter, 60))
  ];
  return new Set([...fixed, ...mobile]);
}

function isBusinessDay(date) {
  const dow = date.getDay();
  if (dow === 0 || dow === 6) return false;
  const holidays = getHolidays(date.getFullYear());
  const key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  return !holidays.has(key);
}

function addCalendarDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function addBusinessDays(date, days) {
  if (days === 0) return new Date(date);
  let d = new Date(date);
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    if (isBusinessDay(d)) added++;
  }
  return d;
}

function calcDates(fromDateStr, fundo) {
  if (!fundo || !FUNDOS_INFO[fundo]) return null;
  const info = FUNDOS_INFO[fundo];
  const parts = fromDateStr.split('/');
  const base = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
  const cotDate = addCalendarDays(base, info.cot);
  const liqDate = addBusinessDays(cotDate, info.liq);
  const fmt = d => d.toLocaleDateString('pt-BR');
  return { cotDate: fmt(cotDate), liqDate: fmt(liqDate) };
}

let data = null;
let dragCardId, dragColId, editTarget;
const uid = () => 'id' + Math.random().toString(36).slice(2, 9);

function save() {
  if (window._firebaseSave) window._firebaseSave();
}

function getCols() { return data.cols[data.activeBoard] || []; }

function ensureResgatadoCol(boardId) {
  const cols = data.cols[boardId];
  if (!cols) return;
  if (!cols.find(c => c._resgatado)) {
    cols.push({ id: uid(), name: 'Resgatado', cards: [], _resgatado: true });
  }
}

function parseDateBR(str) {
  if (!str) return null;
  const [d, m, y] = str.split('/');
  return new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
}

function checkLiquidacoes() {
  if (!data) return;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  let changed = false;

  data.boards.forEach(board => {
    ensureResgatadoCol(board.id);
    const cols = data.cols[board.id] || [];
    const resgatadoCol = cols.find(c => c._resgatado);
    if (!resgatadoCol) return;

    // Move resgates com liqDate vencida para coluna Resgatado
    cols.forEach(col => {
      if (col._resgatado) return;
      const toMove = [];
      col.cards.forEach(card => {
        if ((card.operation === 'resgate_total' || card.operation === 'resgate_parcial') && card.liqDate) {
          const liq = parseDateBR(card.liqDate);
          if (liq && liq <= today) toMove.push(card.id);
        }
      });
      toMove.forEach(cardId => {
        const idx = col.cards.findIndex(c => c.id === cardId);
        if (idx !== -1) {
          const [card] = col.cards.splice(idx, 1);
          addHistory(card, col.name, resgatadoCol.name);
          resgatadoCol.cards.push(card);
          changed = true;
        }
      });
    });

    // Remove cards da coluna Resgatado no dia seguinte à data de referência:
    // - Resgates: dia seguinte à liqDate
    // - Aportes: dia seguinte ao dia em que chegaram na coluna Resgatado
    const toDelete = [];
    resgatadoCol.cards.forEach(card => {
      let refDate = null;

      if (card.operation === 'resgate_total' || card.operation === 'resgate_parcial') {
        // Usa a liqDate do card
        if (card.liqDate) refDate = parseDateBR(card.liqDate);
      } else if (card.operation === 'aplicacao') {
        // Usa a data em que chegou na coluna Resgatado (último histórico)
        const hist = card.history;
        if (hist && hist.length > 0) {
          const last = hist[hist.length - 1];
          const parts = (last.ts || '').split(' ')[0].split('/');
          if (parts.length === 3) {
            const year = parts[2].length === 2 ? 2000 + parseInt(parts[2]) : parseInt(parts[2]);
            refDate = new Date(year, parseInt(parts[1]) - 1, parseInt(parts[0]));
          }
        }
      }

      if (refDate) {
        refDate.setHours(0, 0, 0, 0);
        // Remove no dia seguinte à data de referência
        if (today > refDate) {
          toDelete.push(card.id);
        }
      }
    });
    toDelete.forEach(cardId => {
      const idx = resgatadoCol.cards.findIndex(c => c.id === cardId);
      if (idx !== -1) {
        resgatadoCol.cards.splice(idx, 1);
        changed = true;
      }
    });
  });

  if (changed) render();
}

function render() {
  if (!data) return;
  renderTabs();
  renderBoard();
  save();
}

/* TABS */
function renderTabs() {
  const wrap = document.getElementById('boardTabs');
  wrap.innerHTML = '';

  data.boards.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'board-tab' + (b.id === data.activeBoard ? ' active' : '');
    btn.textContent = b.name;
    btn.onclick = () => { data.activeBoard = b.id; render(); };
    wrap.appendChild(btn);
  });

  if (data.showNewBoard) {
    const inp = document.createElement('input');
    inp.className = 'new-board-input';
    inp.placeholder = 'Nome do board';
    inp.value = data.newBoardName;
    inp.oninput = e => data.newBoardName = e.target.value;
    inp.onkeydown = e => {
      if (e.key === 'Enter') addBoard();
      if (e.key === 'Escape') { data.showNewBoard = false; render(); }
    };
    wrap.appendChild(inp);
    const ok = document.createElement('button');
    ok.className = 'btn-sm';
    ok.style.marginLeft = '4px';
    ok.textContent = 'Criar';
    ok.onclick = addBoard;
    wrap.appendChild(ok);
    setTimeout(() => inp.focus(), 30);
  } else {
    const add = document.createElement('button');
    add.className = 'board-tab-add';
    add.title = 'Novo board';
    add.textContent = '+';
    add.onclick = () => { data.showNewBoard = true; data.newBoardName = ''; render(); };
    wrap.appendChild(add);
  }
}

function addBoard() {
  const n = (data.newBoardName || '').trim();
  if (!n) return;
  const id = uid();
  data.boards.push({ id, name: n });
  data.cols[id] = [];
  ensureResgatadoCol(id);
  data.activeBoard = id;
  data.showNewBoard = false;
  data.newBoardName = '';
  render();
}

/* BOARD */
function renderBoard() {
  const wrap = document.getElementById('boardWrap');
  wrap.innerHTML = '';
  const cols = getCols();

  if (cols.length === 0 && !data.addColForm) {
    const em = document.createElement('div');
    em.className = 'empty-state';
    em.innerHTML = '<div style="font-size:28px;margin-bottom:8px">📋</div>Board vazio.<br>Adicione uma coluna para começar.';
    wrap.appendChild(em);
  }

  cols.forEach(col => {
    wrap.appendChild(buildCol(col));
  });

  const addWrap = document.createElement('div');
  addWrap.className = 'add-col-wrap';

  if (data.addColForm) {
    const form = document.createElement('div');
    form.className = 'add-col-form';
    const inp = document.createElement('input');
    inp.placeholder = 'Nome da coluna';
    inp.value = data.newColName || '';
    inp.oninput = e => data.newColName = e.target.value;
    inp.onkeydown = e => {
      if (e.key === 'Enter') addCol();
      if (e.key === 'Escape') { data.addColForm = false; render(); }
    };
    const row = document.createElement('div');
    row.className = 'form-row';
    const ok = document.createElement('button');
    ok.className = 'btn-primary'; ok.textContent = 'Criar coluna'; ok.onclick = addCol;
    const ca = document.createElement('button');
    ca.className = 'btn-ghost'; ca.textContent = 'Cancelar';
    ca.onclick = () => { data.addColForm = false; render(); };
    row.appendChild(ok); row.appendChild(ca);
    form.appendChild(inp); form.appendChild(row);
    addWrap.appendChild(form);
    setTimeout(() => inp.focus(), 30);
  } else {
    const btn = document.createElement('button');
    btn.className = 'add-col-btn';
    btn.innerHTML = '<span style="font-size:16px;line-height:1">+</span> Nova coluna';
    btn.onclick = () => { data.addColForm = true; data.newColName = ''; render(); };
    addWrap.appendChild(btn);
  }
  wrap.appendChild(addWrap);
}

function buildCol(col) {
  const div = document.createElement('div');
  div.className = 'col' + (col._resgatado ? ' _resgatado-col' : '');
  div.dataset.colId = col.id;

  div.ondragover = e => { e.preventDefault(); div.classList.add('drag-over-col'); };
  div.ondragleave = e => { if (!div.contains(e.relatedTarget)) div.classList.remove('drag-over-col'); };
  div.ondrop = e => { e.preventDefault(); div.classList.remove('drag-over-col'); dropCard(col.id, null); };

  const hdr = document.createElement('div');
  hdr.className = 'col-header';

  const nameEl = document.createElement('input');
  nameEl.className = 'col-name';
  nameEl.value = col.name;
  nameEl.onblur = e => { col.name = e.target.value.trim() || col.name; save(); };
  nameEl.onkeydown = e => { if (e.key === 'Enter') e.target.blur(); };

  const cnt = document.createElement('span');
  cnt.className = 'col-count';
  cnt.textContent = col.cards.length;

  const menuBtn = document.createElement('button');
  menuBtn.className = 'col-menu-btn';
  menuBtn.textContent = '×';
  menuBtn.title = 'Excluir coluna';
  menuBtn.onclick = () => {
    if (col.cards.length > 0 && !confirm(`Excluir "${col.name}" com ${col.cards.length} card(s)?`)) return;
    const cols = getCols();
    cols.splice(cols.findIndex(c => c.id === col.id), 1);
    render();
  };

  hdr.appendChild(nameEl);
  hdr.appendChild(cnt);

  const cols = getCols();
  const colIdx = cols.findIndex(c => c.id === col.id);
  if (colIdx === 1) {
    const exportBtn = document.createElement('button');
    exportBtn.className = 'col-export-btn';
    exportBtn.textContent = '↓ Exportar';
    exportBtn.title = 'Exportar cards e avançar para próxima etapa';
    exportBtn.onclick = () => exportCol(col);
    hdr.appendChild(exportBtn);
  }

  const isConcluido = col.name.trim().toLowerCase() === 'concluído' || col.name.trim().toLowerCase() === 'concluido';
  if (isConcluido) {
    const uploadInput = document.createElement('input');
    uploadInput.type = 'file';
    uploadInput.accept = '.xlsx';
    uploadInput.style.display = 'none';
    uploadInput.onchange = () => processarLiquidacoes(uploadInput);
    div.appendChild(uploadInput);

    const liqBtn = document.createElement('button');
    liqBtn.className = 'col-export-btn';
    liqBtn.textContent = '⬆ Liquidações';
    liqBtn.title = 'Upload de liquidações';
    liqBtn.style.marginLeft = '4px';
    liqBtn.style.padding = '2px 6px';
    liqBtn.style.fontSize = '10px';
    liqBtn.onclick = () => uploadInput.click();
    hdr.appendChild(liqBtn);
  }

  hdr.appendChild(menuBtn);
  div.appendChild(hdr);

  const area = document.createElement('div');
  area.className = 'cards-area';
  area.ondragover = e => e.preventDefault();
  area.ondrop = e => { e.preventDefault(); dropCard(col.id, null); };

  col.cards.forEach(card => area.appendChild(buildCard(card, col.id)));
  div.appendChild(area);

  // Só permite adicionar card na primeira coluna (índice 0), ignorando a coluna Resgatado
  const allCols = getCols();
  const nonResgatado = allCols.filter(c => !c._resgatado);
  const isFirstCol = nonResgatado.length > 0 && nonResgatado[0].id === col.id;

  if (data.cardForms && data.cardForms[col.id]) {
    div.appendChild(buildCardForm(col.id));
  } else if (isFirstCol) {
    const addBtn = document.createElement('button');
    addBtn.className = 'add-card-btn';
    addBtn.textContent = '+ Adicionar card';
    addBtn.onclick = () => {
      if (!data.cardForms) data.cardForms = {};
      data.cardForms[col.id] = { title: '', desc: '', tag: 'slate', author: '', cliente: '', fundo: '', cnpj: '', operation: '', value: '', banco: '' };
      render();
    };
    div.appendChild(addBtn);
  }

  return div;
}

  const clienteInp = document.createElement('input');
  clienteInp.className = 'ac-input';
  clienteInp.placeholder = '— buscar cliente';
  clienteInp.value = f.cliente || '';
  clienteInp.autocomplete = 'off';

  const clienteList = document.createElement('div');
  clienteList.className = 'ac-list';

  let acActiveIdx = -1;

  function renderAcList(filter) {
    clienteList.innerHTML = '';
    acActiveIdx = -1;
    const filtered = CLIENTES.filter(c => c.toLowerCase().includes(filter.toLowerCase()));
    if (filtered.length === 0 || filter === '') {
      clienteList.classList.remove('open');
      return;
    }
    filtered.forEach((nome, i) => {
      const item = document.createElement('div');
      item.className = 'ac-item';
      item.textContent = nome;
      item.onmousedown = e => {
        e.preventDefault();
        clienteInp.value = nome;
        f.cliente = nome;
        clienteList.classList.remove('open');
      };
      clienteList.appendChild(item);
    });
    clienteList.classList.add('open');
  }

  clienteInp.oninput = e => {
    f.cliente = '';
    renderAcList(e.target.value);
  };

  clienteInp.onkeydown = e => {
    const items = clienteList.querySelectorAll('.ac-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acActiveIdx = Math.min(acActiveIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('active', i === acActiveIdx));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      acActiveIdx = Math.max(acActiveIdx - 1, 0);
      items.forEach((el, i) => el.classList.toggle('active', i === acActiveIdx));
    } else if (e.key === 'Enter' && acActiveIdx >= 0) {
      e.preventDefault();
      const chosen = items[acActiveIdx].textContent;
      clienteInp.value = chosen;
      f.cliente = chosen;
      clienteList.classList.remove('open');
    } else if (e.key === 'Escape') {
      clienteList.classList.remove('open');
    }
  };

  clienteInp.onblur = () => {
    setTimeout(() => clienteList.classList.remove('open'), 150);
    const match = CLIENTES.find(c => c.toLowerCase() === clienteInp.value.toLowerCase());
    if (match) {
      clienteInp.value = match;
      f.cliente = match;
      f.fundo = ''; f.banco = ''; f.cnpj = '';
      popularFundos();
      cnpjInp.value = ''; cnpjWrap.style.display = 'none';
    } else if (!CLIENTES.includes(clienteInp.value)) {
      clienteInp.value = f.cliente || '';
    }
  };

  clienteWrap.appendChild(clienteInp);
  clienteWrap.appendChild(clienteList);
  const clienteSel = clienteWrap; // alias para manter compatibilidade com append abaixo

  const fundoSel = document.createElement('select');

  function popularFundos() {
    fundoSel.innerHTML = '';
    const def = document.createElement('option');
    def.value = ''; def.textContent = '— selecione o fundo';
    fundoSel.appendChild(def);

    const isResgate = f.operation === 'resgate_total' || f.operation === 'resgate_parcial';
    const clientePosicoes = f.cliente && isResgate ? (posicoes[f.cliente] || []) : null;

    if (clientePosicoes && clientePosicoes.length > 0) {
      clientePosicoes.forEach(item => {
        const o = document.createElement('option');
        o.value = item.produto;
        o.textContent = item.produto;
        o.dataset.banco = item.banco;
        if ((f.fundo || '') === item.produto) o.selected = true;
        fundoSel.appendChild(o);
      });
    } else {
      Object.keys(FUNDOS).forEach(nome => {
        const o = document.createElement('option');
        o.value = nome; o.textContent = nome;
        if ((f.fundo || '') === nome) o.selected = true;
        fundoSel.appendChild(o);
      });
    }

    const outroOpt = document.createElement('option');
    outroOpt.value = '__outro__'; outroOpt.textContent = 'Outro…';
    if (f._fundoOutro) outroOpt.selected = true;
    fundoSel.appendChild(outroOpt);
  }

  popularFundos();

  const fundoOutroInp = document.createElement('input');
  fundoOutroInp.type = 'text';
  fundoOutroInp.placeholder = 'Nome do fundo';
  fundoOutroInp.value = f._fundoOutro || '';
  fundoOutroInp.style.display = f._fundoOutro ? 'block' : 'none';
  fundoOutroInp.oninput = e => { f._fundoOutro = e.target.value; f.fundo = e.target.value || 'Outro'; };

  const cnpjWrap = document.createElement('div');
  cnpjWrap.style.cssText = 'position:relative;display:' + (f.fundo && !f._fundoOutro ? 'block' : 'none');
  const cnpjPrefix = document.createElement('span');
  cnpjPrefix.textContent = 'CNPJ';

  const cnpjInp = document.createElement('input');
  cnpjInp.type = 'text';
  cnpjInp.readOnly = true;
  cnpjInp.value = (f.fundo && !f._fundoOutro) ? (FUNDOS[f.fundo] || '') : '';
  cnpjInp.style.cssText = 'padding-left:42px;background:var(--surface2);color:var(--text3);cursor:default;font-family:DM Mono,monospace;font-size:11px;';
  cnpjWrap.appendChild(cnpjPrefix);
  cnpjWrap.appendChild(cnpjInp);

  fundoSel.onchange = e => {
    const isOutro = e.target.value === '__outro__';
    fundoOutroInp.style.display = isOutro ? 'block' : 'none';
    if (isOutro) {
      f._fundoOutro = fundoOutroInp.value || '';
      f.fundo = f._fundoOutro || 'Outro';
      f.cnpj = ''; f.banco = '';
      cnpjInp.value = '';
      cnpjWrap.style.display = 'none';
    } else {
      f._fundoOutro = '';
      fundoOutroInp.value = '';
      f.fundo = e.target.value;
      f.cnpj = FUNDOS[f.fundo] || '';
      cnpjInp.value = f.cnpj;
      cnpjWrap.style.display = (f.fundo && FUNDOS[f.fundo]) ? 'block' : 'none';
      // Preenche banco automaticamente pela posição do cliente
      const selectedOpt = fundoSel.options[fundoSel.selectedIndex];
      if (selectedOpt && selectedOpt.dataset.banco) {
        f.banco = selectedOpt.dataset.banco;
        bancoSel.value = f.banco;
      }
    }
  };

  const opSel = document.createElement('select');
  [['', '— tipo de operação'], ['resgate_total', 'Resgate Total'], ['resgate_parcial', 'Resgate Parcial'], ['aplicacao', 'Aporte']].forEach(([v, l]) => {
    const o = document.createElement('option');
    o.value = v; o.textContent = l;
    if ((f.operation || '') === v) o.selected = true;
    opSel.appendChild(o);
  });

  const valueWrap = document.createElement('div');
  valueWrap.style.cssText = 'position:relative;display:' + (['resgate_parcial','aplicacao'].includes(f.operation||'') ? 'block' : 'none');
  const valuePrefix = document.createElement('span');
  valuePrefix.textContent = 'R$';
  valuePrefix.style.cssText = 'position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text2);pointer-events:none;font-family:DM Sans,sans-serif;';
  const valueInp = document.createElement('input');
  valueInp.type = 'text';
  valueInp.placeholder = '0,00';
  valueInp.value = f.value || '';
  valueInp.style.paddingLeft = '28px';
  valueInp.oninput = e => {
    const raw = e.target.value.replace(/[^0-9]/g, '');
    const num = raw ? (parseInt(raw, 10) / 100) : '';
    const fmt = num !== '' ? num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '';
    e.target.value = fmt;
    f.value = fmt;
  };
  valueWrap.appendChild(valuePrefix);
  valueWrap.appendChild(valueInp);

  opSel.onchange = e => {
    f.operation = e.target.value;
    valueWrap.style.display = ['resgate_parcial','aplicacao'].includes(f.operation) ? 'block' : 'none';
    if (!['resgate_parcial','aplicacao'].includes(f.operation)) { f.value = ''; valueInp.value = ''; }
    f.fundo = ''; f.banco = ''; f.cnpj = '';
    popularFundos();
    cnpjInp.value = ''; cnpjWrap.style.display = 'none';
  };

  const bancoSel = document.createElement('select');
  const bancoDefault = document.createElement('option');
  bancoDefault.value = ''; bancoDefault.textContent = '— selecione o banco';
  bancoSel.appendChild(bancoDefault);
  ['XP INVESTIMENTOS', 'BANCO BTG PACTUAL', 'ITAÚ UNIBANCO', 'BRADESCO', 'SANTANDER', 'ICATU', 'BANCO DO BRASIL', 'UBS', 'BRL TRUST'].forEach(nome => {
    const o = document.createElement('option');
    o.value = nome; o.textContent = nome;
    if ((f.banco || '') === nome) o.selected = true;
    bancoSel.appendChild(o);
  });
  bancoSel.onchange = e => f.banco = e.target.value;

  const row = document.createElement('div');
  row.className = 'form-row';

  const ok = document.createElement('button');
  ok.className = 'btn-primary';
  ok.textContent = 'Adicionar';
  ok.onclick = () => saveCard(colId);

  const ca = document.createElement('button');
  ca.className = 'btn-ghost';
  ca.textContent = 'Cancelar';
  ca.onclick = () => { delete data.cardForms[colId]; render(); };

  row.appendChild(ok); row.appendChild(ca);

  const onshoreWrap = document.createElement('div');
  onshoreWrap.style.cssText = 'display:' + (f.shore === 'onshore' ? 'flex' : 'none') + ';flex-direction:column;gap:7px;';
  onshoreWrap.appendChild(opSel);
  onshoreWrap.appendChild(valueWrap);
  onshoreWrap.appendChild(fundoSel);
  onshoreWrap.appendChild(fundoOutroInp);
  onshoreWrap.appendChild(cnpjWrap);
  onshoreWrap.appendChild(bancoSel);

  const offshoreWrap = document.createElement('div');
  offshoreWrap.style.cssText = 'display:' + (f.shore === 'offshore' ? 'flex' : 'none') + ';flex-direction:column;gap:7px;';

  const offFundoSel = document.createElement('select');
  const offFundoDef = document.createElement('option');
  offFundoDef.value = ''; offFundoDef.textContent = '— selecione o fundo';
  offFundoSel.appendChild(offFundoDef);
  FUNDOS_OFFSHORE.forEach(nome => {
    const o = document.createElement('option');
    o.value = nome; o.textContent = nome;
    if ((f.fundo || '') === nome) o.selected = true;
    offFundoSel.appendChild(o);

  const offOutroOpt = document.createElement('option');
  offOutroOpt.value = '__outro__'; offOutroOpt.textContent = 'Outro…';
  offFundoSel.appendChild(offOutroOpt);

  const offFundoOutroInp = document.createElement('input');
  offFundoOutroInp.type = 'text';
  offFundoOutroInp.placeholder = 'Nome do fundo';
  offFundoOutroInp.value = f._fundoOutro || '';
  offFundoOutroInp.style.display = (f.shore === 'offshore' && f._fundoOutro) ? 'block' : 'none';
  offFundoOutroInp.oninput = e => { f._fundoOutro = e.target.value; f.fundo = e.target.value || 'Outro'; };

  offFundoSel.onchange = e => {
    const isOutro = e.target.value === '__outro__';
    offFundoOutroInp.style.display = isOutro ? 'block' : 'none';
    if (isOutro) { f._fundoOutro = ''; f.fundo = 'Outro'; }
    else { f._fundoOutro = ''; f.fundo = e.target.value; }
  };

  const offOpSel = document.createElement('select');
  [['', '— tipo de operação'], ['resgate_total', 'Resgate Total'], ['resgate_parcial', 'Resgate Parcial'], ['aplicacao', 'Aporte']].forEach(([v, l]) => {
    const o = document.createElement('option');
    o.value = v; o.textContent = l;
    if ((f.operation || '') === v) o.selected = true;
    offOpSel.appendChild(o);
  });

  const offValueWrap = document.createElement('div');
  offValueWrap.style.cssText = 'position:relative;display:' + (['resgate_parcial','aplicacao'].includes(f.operation||'') ? 'block' : 'none');
  const offValuePrefix = document.createElement('span');
  offValuePrefix.textContent = 'USD';
  offValuePrefix.style.cssText = 'position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text2);pointer-events:none;font-family:DM Sans,sans-serif;';
  const offValueInp = document.createElement('input');
  offValueInp.type = 'text';
  offValueInp.placeholder = '0,00';
  offValueInp.value = f.value || '';
  offValueInp.style.paddingLeft = '40px';
  offValueInp.oninput = e => {
    const raw = e.target.value.replace(/[^0-9]/g, '');
    const num = raw ? (parseInt(raw, 10) / 100) : '';
    const fmt = num !== '' ? num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '';
    e.target.value = fmt;
    f.value = fmt;
  };
  offValueWrap.appendChild(offValuePrefix);
  offValueWrap.appendChild(offValueInp);

  offOpSel.onchange = e => {
    f.operation = e.target.value;
    offValueWrap.style.display = ['resgate_parcial','aplicacao'].includes(f.operation) ? 'block' : 'none';
    if (!['resgate_parcial','aplicacao'].includes(f.operation)) { f.value = ''; offValueInp.value = ''; }
  };

  offshoreWrap.appendChild(offFundoSel);
  offshoreWrap.appendChild(offFundoOutroInp);
  offshoreWrap.appendChild(offOpSel);
  offshoreWrap.appendChild(offValueWrap);

  wrap.appendChild(shoreToggle);
  wrap.appendChild(authorSel);
  wrap.appendChild(clienteSel);
  wrap.appendChild(onshoreWrap);
  wrap.appendChild(offshoreWrap);
  wrap.appendChild(desc);
  wrap.appendChild(row);

  return wrap;
}


function nowStamp() {
  const n = new Date();
  const d = String(n.getDate()).padStart(2,'0');
  const m = String(n.getMonth()+1).padStart(2,'0');
  const y = String(n.getFullYear()).slice(-2);
  const t = n.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  return `${d}/${m}/${y} ${t}`;
}




function currentUserEmail() {
  const u = window._firebaseUser ? window._firebaseUser() : null;
  return u ? u.email : '';
}

function addHistory(card, fromColName, toColName) {
  if (!card.history) card.history = [];
  card.history.push({ ts: nowStamp(), from: fromColName || null, to: toColName, user: currentUserEmail() });
}

function moveCardToCol(cardId, fromColId, toColId) {
  const cols = getCols();
  const fromCol = cols.find(c => c.id === fromColId);
  const toCol = cols.find(c => c.id === toColId);
  if (!fromCol || !toCol) return;
  const idx = fromCol.cards.findIndex(c => c.id === cardId);
  if (idx === -1) return;
  const [card] = fromCol.cards.splice(idx, 1);
  addHistory(card, fromCol.name, toCol.name);
  toCol.cards.push(card);
  render();
}

function formatValueInput(el) {
  const raw = el.value.replace(/[^0-9]/g, '');
  const num = raw ? (parseInt(raw, 10) / 100) : '';
  const fmt = num !== '' ? num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '';
  el.value = fmt;
}

function formatCurrency(raw) {
  const num = parseFloat(String(raw).replace(/\./g, '').replace(',', '.'));
  if (isNaN(num)) return raw;
  return num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function saveCard(colId) {
  if (!data.cardForms) data.cardForms = {};
  const f = data.cardForms[colId];
  // Gera título automático a partir do cliente e operação
  const OP_AUTO = { resgate_total: 'Resgate Total', resgate_parcial: 'Resgate Parcial', aplicacao: 'Aporte' };
  const autoTitle = [f.cliente, OP_AUTO[f.operation]].filter(Boolean).join(' — ') || 'Card';
  f.title = autoTitle;

  const col = getCols().find(c => c.id === colId);
  if (col) {
    const createdAt = new Date().toLocaleDateString('pt-BR');
    let cotDate = '', liqDate = '';
    if ((f.operation === 'resgate_total' || f.operation === 'resgate_parcial') && f.fundo) {
      const dates = calcDates(createdAt, f.fundo);
      if (dates) { cotDate = dates.cotDate; liqDate = dates.liqDate; }
    }
    const rawValue = f.value || '';
    const newCard = {
      id: uid(),
      title: autoTitle,
      desc: f.desc || '',
      tag: f.tag || 'slate',
      createdAt,
      author: f.author || '',
      cliente: f.cliente || '',
      fundo: f.fundo || '',
      cnpj: f.shore === 'offshore' ? '' : (f.cnpj || ''),
      operation: f.operation || '',
      value: rawValue ? formatCurrency(rawValue) : '',
      cotDate: f.shore === 'offshore' ? '' : cotDate,
      liqDate: f.shore === 'offshore' ? '' : liqDate,
      banco: f.shore === 'offshore' ? '' : (f.banco || ''),
      shore: f.shore || 'onshore',
      history: []
    };
    addHistory(newCard, null, col.name);
    col.cards.push(newCard);
  }
  delete data.cardForms[colId];

  if (col) {
    const cols = getCols();
    const colIdx = cols.findIndex(c => c.id === colId);
    if (colIdx !== -1 && colIdx < cols.length - 1) {
      const card = col.cards[col.cards.length - 1];
      const nextCol = cols[colIdx + 1];
      col.cards.splice(col.cards.length - 1, 1);
      addHistory(card, col.name, nextCol.name);
      nextCol.cards.push(card);
    }
  }

  render();
}

function addCol() {
  const n = (data.newColName || '').trim();
  if (!n) return;
  getCols().push({ id: uid(), name: n, cards: [] });
  data.addColForm = false;
  data.newColName = '';
  render();
}

/* DRAG & DROP */
function dropCard(toColId, beforeCardId) {
  if (!dragCardId) return;
  let card = null;
  let fromColName = '';
  getCols().forEach(col => {
    const i = col.cards.findIndex(c => c.id === dragCardId);
    if (i > -1) { card = col.cards.splice(i, 1)[0]; fromColName = col.name; }
  });
  if (!card) return;
  const toCol = getCols().find(c => c.id === toColId);
  if (!toCol) return;
  addHistory(card, fromColName, toCol.name);
  if (beforeCardId) {
    const i = toCol.cards.findIndex(c => c.id === beforeCardId);
    toCol.cards.splice(i > -1 ? i : toCol.cards.length, 0, card);
  } else {
    toCol.cards.push(card);
  }
  render();
}

/* EDIT MODAL */
function openEdit(card, colId) {
  editTarget = { card, colId };
  document.getElementById('editTitle').value = card.title;
  document.getElementById('editDesc').value = card.desc || '';
  document.getElementById('editTag').value = card.tag || 'slate';
  document.getElementById('editAuthor').value = card.author || '';
  document.getElementById('editCliente').value = card.cliente || '';
  document.getElementById('editOperation').value = card.operation || '';
  document.getElementById('editValue').value = card.value || '';
  toggleEditValue();
  document.getElementById('editBanco').value = card.banco || '';

  const fundoSelect = document.getElementById('editFundo');
  const fundoOutro = document.getElementById('editFundoOutro');
  const knownFundos = Array.from(fundoSelect.options).map(o => o.value).filter(v => v && v !== '__outro__');
  if (card.fundo && !knownFundos.includes(card.fundo)) {
    fundoSelect.value = '__outro__';
    fundoOutro.value = card.fundo;
  } else {
    fundoSelect.value = card.fundo || '';
    fundoOutro.value = '';
  }

  updateEditCnpj();
  refreshEditDates();
  const shore = card.shore || 'onshore';
  setEditShore(shore);

  // Preenche campos offshore
  if (shore === 'offshore') {
    const offFundoSel = document.getElementById('editFundoOffshore');
    const knownOff = Array.from(offFundoSel.options).map(o => o.value).filter(v => v && v !== '__outro__');
    if (card.fundo && !knownOff.includes(card.fundo)) {
      offFundoSel.value = '__outro__';
      document.getElementById('editFundoOffshoreOutro').value = card.fundo;
      document.getElementById('editFundoOffshoreOutroWrap').style.display = 'block';
    } else {
      offFundoSel.value = card.fundo || '';
      document.getElementById('editFundoOffshoreOutroWrap').style.display = 'none';
    }
    document.getElementById('editOperationOffshore').value = card.operation || '';
    document.getElementById('editValueOffshore').value = card.value || '';
    const showVal = ['resgate_parcial','aplicacao'].includes(card.operation || '');
    document.getElementById('editValueOffshoreWrap').style.display = showVal ? 'block' : 'none';
  }

  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editTitle').focus(), 50);
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  editTarget = null;
}

function saveEdit() {
  if (!editTarget) return;
  const t = document.getElementById('editTitle').value.trim();
  if (!t) return;
  editTarget.card.title = t;
  editTarget.card.desc = document.getElementById('editDesc').value.trim();
  editTarget.card.tag = document.getElementById('editTag').value;
  editTarget.card.author = document.getElementById('editAuthor').value;
  editTarget.card.cliente = document.getElementById('editCliente').value;
  editTarget.card.shore = document.getElementById('editShoreOffshore').classList.contains('active') ? 'offshore' : 'onshore';

  if (editTarget.card.shore === 'offshore') {
    const offFundoVal = document.getElementById('editFundoOffshore').value;
    const offIsOutro = offFundoVal === '__outro__';
    editTarget.card.fundo = offIsOutro
      ? (document.getElementById('editFundoOffshoreOutro').value.trim() || 'Outro')
      : offFundoVal;
    editTarget.card.operation = document.getElementById('editOperationOffshore').value;
    const offRaw = ['resgate_parcial','aplicacao'].includes(editTarget.card.operation)
      ? document.getElementById('editValueOffshore').value.trim() : '';
    editTarget.card.value = offRaw ? formatCurrency(offRaw) : '';
    editTarget.card.banco = '';
    editTarget.card.cnpj = '';
    editTarget.card.cotDate = '';
    editTarget.card.liqDate = '';
  } else {
    editTarget.card.operation = document.getElementById('editOperation').value;
    const rawValue = ['resgate_parcial','aplicacao'].includes(editTarget.card.operation) ? document.getElementById('editValue').value.trim() : '';
    editTarget.card.value = rawValue ? formatCurrency(rawValue) : '';
    editTarget.card.banco = document.getElementById('editBanco').value;
    const fundoSel = document.getElementById('editFundo').value;
    const isOutro = fundoSel === '__outro__';
    editTarget.card.fundo = isOutro
      ? (document.getElementById('editFundoOutro').value.trim() || 'Outro')
      : fundoSel;
    editTarget.card.cnpj = isOutro ? '' : (FUNDOS[editTarget.card.fundo] || '');
    if (!isOutro && (editTarget.card.operation === 'resgate_total' || editTarget.card.operation === 'resgate_parcial') && editTarget.card.fundo && editTarget.card.createdAt) {
      const dates = calcDates(editTarget.card.createdAt, editTarget.card.fundo);
      if (dates) { editTarget.card.cotDate = dates.cotDate; editTarget.card.liqDate = dates.liqDate; }
    } else {
      editTarget.card.cotDate = ''; editTarget.card.liqDate = '';
    }
  }

  closeModal();
  render();
}

function deleteFromModal() {
  if (!editTarget) return;
  if (!confirm('Excluir este card?')) return;
  let found = false;
  getCols().forEach(col => {
    const i = col.cards.findIndex(c => c.id === editTarget.card.id);
    if (i > -1) { col.cards.splice(i, 1); found = true; }
  });
  closeModal();
  if (found) render();
}

function setEditShore(shore) {
  document.getElementById('editShoreOnshore').classList.toggle('active', shore === 'onshore');
  document.getElementById('editShoreOffshore').classList.toggle('active', shore === 'offshore');
  document.getElementById('editOnshoreFields').style.display = shore === 'onshore' ? 'block' : 'none';
  document.getElementById('editOffshoreFields').style.display = shore === 'offshore' ? 'block' : 'none';

}

document.getElementById('editFundoOffshore').addEventListener('change', function() {
  const isOutro = this.value === '__outro__';
  document.getElementById('editFundoOffshoreOutroWrap').style.display = isOutro ? 'block' : 'none';
});

document.getElementById('editOperationOffshore').addEventListener('change', function() {
  const show = ['resgate_parcial','aplicacao'].includes(this.value);
  document.getElementById('editValueOffshoreWrap').style.display = show ? 'block' : 'none';
  if (!show) document.getElementById('editValueOffshore').value = '';
});

function toggleEditValue() {
  const op = document.getElementById('editOperation').value;
  const show = ['resgate_parcial','aplicacao'].includes(op);
  document.getElementById('editValueWrap').style.display = show ? 'block' : 'none';
  if (!show) document.getElementById('editValue').value = '';
  refreshEditDates();
}

function updateEditCnpj() {
  const fundo = document.getElementById('editFundo').value;
  const isOutro = fundo === '__outro__';
  document.getElementById('editFundoOutroWrap').style.display = isOutro ? 'block' : 'none';
  if (!isOutro) document.getElementById('editFundoOutro').value = '';
  const cnpj = (!isOutro && fundo) ? (FUNDOS[fundo] || '') : '';
  document.getElementById('editCnpj').value = cnpj;
  document.getElementById('editCnpjWrap').style.display = (!isOutro && fundo) ? 'block' : 'none';
  refreshEditDates();
}

function refreshEditDates() {
  const op = document.getElementById('editOperation').value;
  const fundo = document.getElementById('editFundo').value;
  const wrap = document.getElementById('editDatesWrap');
  const isResgate = op === 'resgate_total' || op === 'resgate_parcial';
  const isOutro = fundo === '__outro__';
  if (!isOutro && isResgate && fundo && editTarget && editTarget.card.createdAt) {
    const dates = calcDates(editTarget.card.createdAt, fundo);
    if (dates) {
      document.getElementById('editCotDate').value = dates.cotDate;
      document.getElementById('editLiqDate').value = dates.liqDate;
      wrap.style.display = 'flex';
      return;
    }
  }
  wrap.style.display = 'none';
}

/* ── XLSX EXPORT ── */
async function exportCol(col) {
  if (col.cards.length === 0) { alert('Nenhum card para exportar.'); return; }
  if (!confirm(`Exportar ${col.cards.length} card(s) e avançar para a próxima etapa?`)) return;

  // Resgate Total e Parcial → "Resgate"; Aporte → "Aporte"
  const OP_LABELS = { resgate_total: 'Resgate', resgate_parcial: 'Resgate', aplicacao: 'Aporte' };
  const headers = ['Data','Tipo','Operação','Cliente','Bco','Ag','Conta','Tipo Conta Turim','Produto','Quantidade','PU','Total','Valor','IR','Interna','Classificação','Observação','Evento','Data de Cotização','Data de Liquidação','Bco Destino','Ag Destino','Conta Destino','Tipo Conta Turim Destino','Produto Destino','Data de Cotização','Data de Liquidação','Tipo Confirmação','Tipo Assinatura','CHECK'];

  // Converte DD/MM/YY ou DD/MM/YYYY para número serial do Excel
  function dateToSerial(str) {
    if (!str) return null;
    const p = str.split('/');
    if (p.length !== 3) return null;
    const d = parseInt(p[0]), m = parseInt(p[1]);
    const y = p[2].length === 2 ? 2000 + parseInt(p[2]) : parseInt(p[2]);
    const date = new Date(y, m - 1, d);
    // Serial do Excel: dias desde 1900-01-01 (com bug do ano bissexto 1900)
    const epoch = new Date(1899, 11, 30);
    const serial = Math.round((date - epoch) / 86400000);
    return serial;
  }

  function fmtValor(str) {
    if (!str) return '';
    const n = parseFloat(String(str).replace(/\./g, '').replace(',', '.'));
    return isNaN(n) ? '' : String(Math.round(n));
  }

  // Índices das colunas de data (0-based): Data=0, CotDate=18, LiqDate=19, CotDate2=25, LiqDate2=26
  const DATE_COLS = new Set([0, 18, 19, 25, 26]);

  const dataRows = col.cards.map(card => {
    const isResgateTotal = card.operation === 'resgate_total';
    const operacao = OP_LABELS[card.operation] || card.operation || '';
    const total = isResgateTotal ? 'SIM' : '';
    const valor = isResgateTotal ? '' : fmtValor(card.value || '');
    return [
      card.createdAt||'',   // 0 - Data (será serial)
      'TURIM',              // 1
      operacao,             // 2
      card.cliente||'',     // 3
      card.banco||'',       // 4
      '','',                // 5,6
      'Gestão',             // 7
      card.fundo||'',       // 8
      '','',                // 9,10
      total,                // 11
      valor,                // 12
      '','Não','','','',    // 13-17
      card.cotDate||'',     // 18
      card.liqDate||'',     // 19
      '','','','','',       // 20-24
      card.cotDate||'',     // 25
      card.liqDate||'',     // 26
      '','',''              // 27-29
    ];
  });

  const allRows = [['Boleta Cliente'],[],headers,...dataRows];

  const ss=[]; const ssIdx={};
  function si(v){const s=String(v);if(ssIdx[s]===undefined){ssIdx[s]=ss.length;ss.push(s);}return ssIdx[s];}
  function esc(v){return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function cn(n){let s='';for(n++;n>0;n=Math.floor((n-1)/26))s=String.fromCharCode(((n-1)%26)+65)+s;return s;}

  // Estilo de data: numFmtId=14 (DD/MM/YYYY)
  const stylesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">' +
    '<numFmts count="1"><numFmt numFmtId="164" formatCode="DD/MM/YYYY"/></numFmts>' +
    '<fonts count="1"><font><sz val="11"/><name val="Arial"/></font></fonts>' +
    '<fills count="2"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill></fills>' +
    '<borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders>' +
    '<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>' +
    '<cellXfs count="2">' +
    '<xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>' +
    '<xf numFmtId="164" fontId="0" fillId="0" borderId="0" xfId="0" applyNumberFormat="1"/>' +
    '</cellXfs>' +
    '</styleSheet>';

  // DATA_ROW_START: linha das datas começa na linha 4 (0-indexed: row 3), que é a primeira linha de dados
  const DATA_ROW_START = 3; // allRows[0]=Boleta, [1]=vazia, [2]=headers, [3..]=dados

  let shXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  allRows.forEach((row,ri)=>{
    let cells='';
    row.forEach((cell,ci)=>{
      const v=(cell===null||cell===undefined)?'':String(cell);
      if(!v) return;
      const isDataRow = ri >= DATA_ROW_START;
      const isDateCol = DATE_COLS.has(ci);
      if(isDataRow && isDateCol) {
        const serial = dateToSerial(v);
        if(serial) {
          cells+=`<c r="${cn(ci)}${ri+1}" s="1"><v>${serial}</v></c>`;
          return;
        }
      }
      cells+=`<c r="${cn(ci)}${ri+1}" t="s"><v>${si(v)}</v></c>`;
    });
    if(cells)shXml+=`<row r="${ri+1}">${cells}</row>`;
  });
  shXml+='</sheetData></worksheet>';

  let ssXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${ss.length}" uniqueCount="${ss.length}">`;
  ss.forEach(s=>{ssXml+=`<si><t xml:space="preserve">${esc(s)}</t></si>`;});
  ssXml+='</sst>';

  const wbXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Template" sheetId="1" r:id="rId1"/></sheets></workbook>';
  const wbRels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/><Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>';
  const rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
  const ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>';

  const te = new TextEncoder();
  const files = [
    {name:'[Content_Types].xml', data:te.encode(ct)},
    {name:'_rels/.rels', data:te.encode(rels)},
    {name:'xl/workbook.xml', data:te.encode(wbXml)},
    {name:'xl/_rels/workbook.xml.rels', data:te.encode(wbRels)},
    {name:'xl/worksheets/sheet1.xml', data:te.encode(shXml)},
    {name:'xl/sharedStrings.xml', data:te.encode(ssXml)},
    {name:'xl/styles.xml', data:te.encode(stylesXml)},
  ];

  function crc32(buf){
    let c=0xFFFFFFFF;
    const t=new Uint32Array(256);
    for(let i=0;i<256;i++){let x=i;for(let j=0;j<8;j++)x=(x&1)?(0xEDB88320^(x>>>1)):(x>>>1);t[i]=x;}
    for(let i=0;i<buf.length;i++)c=t[(c^buf[i])&0xFF]^(c>>>8);
    return(c^0xFFFFFFFF)>>>0;
  }

  function w16(v){return new Uint8Array([v&0xff,(v>>8)&0xff]);}
  function w32(v){return new Uint8Array([v&0xff,(v>>8)&0xff,(v>>16)&0xff,(v>>24)&0xff]);}
  function concat(...arrays){
    const total=arrays.reduce((s,a)=>s+a.length,0);
    const out=new Uint8Array(total);let off=0;
    arrays.forEach(a=>{out.set(a,off);off+=a.length;});
    return out;
  }

  const localParts=[], centralParts=[];
  let offset=0;

  files.forEach(({name,data})=>{
    const nb=te.encode(name);
    const crc=crc32(data);
    const sz=data.length;
    const lh=concat(
      new Uint8Array([0x50,0x4B,0x03,0x04]),
      w16(20),w16(0),w16(0),
      w16(0),w16(0),
      w32(crc),w32(sz),w32(sz),
      w16(nb.length),w16(0),
      nb, data
    );
    const cd=concat(
      new Uint8Array([0x50,0x4B,0x01,0x02]),
      w16(20),w16(20),w16(0),w16(0),
      w16(0),w16(0),
      w32(crc),w32(sz),w32(sz),
      w16(nb.length),w16(0),w16(0),
      w16(0),w16(0),
      w32(0),
      w32(offset),
      nb
    );
    localParts.push(lh);
    centralParts.push(cd);
    offset+=lh.length;
  });

  const cdSize=centralParts.reduce((s,a)=>s+a.length,0);
  const eocd=concat(
    new Uint8Array([0x50,0x4B,0x05,0x06]),
    w16(0),w16(0),
    w16(files.length),w16(files.length),
    w32(cdSize),w32(offset),
    w16(0)
  );

  const zip=concat(...localParts,...centralParts,eocd);
  const blob=new Blob([zip],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const ds=new Date().toLocaleDateString('pt-BR').replace(/\//g,'');
  a.href=url; a.download=`Boleta_${ds}.xlsx`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);

  gerarTabelaVisual(col.cards, ds);

  const cols=getCols();
  const colIdx=cols.findIndex(c=>c.id===col.id);
  if(colIdx!==-1&&colIdx<cols.length-1){
    const nextCol=cols[colIdx+1];
    col.cards.forEach(card=>{addHistory(card,col.name,nextCol.name);nextCol.cards.push(card);});
    col.cards=[];
  }
  render();
}

  const OP_LABELS = { resgate_total: 'Resgate', resgate_parcial: 'Resgate', aplicacao: 'Aporte' };

  const rows = cards.map(card => [
    card.createdAt || '',
    OP_LABELS[card.operation] || card.operation || '',
    card.cliente || '',
    card.banco || '',
    card.fundo || '',
    card.operation === 'resgate_total' ? '' : (card.value || ''),
    '',
    ''
  ]);

  const cols = ['Data','Tipo','Cliente','Banco','Ativo','Valor','Origem/Destino Liquidez','Observações'];

  const tableHtml = `
    <table style="border-collapse:collapse;font-family:Arial,sans-serif;font-size:13px;width:100%">
      <thead>
        <tr>${cols.map(c=>`<th style="border:1px solid #ccc;padding:7px 12px;background:#f5f5f5;font-weight:600;text-align:left;white-space:nowrap">${c}</th>`).join('')}</tr>
      </thead>

        ${rows.map(r=>`<tr>${r.map(cell=>`<td style="border:1px solid #ccc;padding:6px 12px;white-space:nowrap">${cell}</td>`).join('')}</tr>`).join('')}
      </tbody>
    </table>
  `;

  let overlay = document.getElementById('tabelaEmailModal');
  if (overlay) overlay.remove();

  overlay = document.createElement('div');
  overlay.id = 'tabelaEmailModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;';

  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:10px;padding:28px;max-width:92vw;max-height:85vh;overflow:auto;box-shadow:0 8px 32px rgba(0,0,0,.18);display:flex;flex-direction:column;gap:16px;';

  const title = document.createElement('div');
  title.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:16px;';
  title.innerHTML = `<span style="font-family:DM Sans,sans-serif;font-size:15px;font-weight:600">Tabela para e-mail</span>`;

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;';

  const btnCopy = document.createElement('button');
  btnCopy.textContent = 'Copiar tabela';
  btnCopy.style.cssText = 'padding:7px 16px;background:#1c1b18;color:#fff;border:none;border-radius:6px;font-size:13px;font-family:DM Sans,sans-serif;cursor:pointer;font-weight:500;';
  btnCopy.onclick = () => {

/* ── UPLOAD DE LIQUIDAÇÕES ── */
function processarLiquidacoes(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

      if (!rows.length) { alert('Arquivo vazio ou sem dados.'); return; }

      const colKey = (row, ...names) => {
        const keys = Object.keys(row);
        for (const n of names) {
          const found = keys.find(k => k.trim().toLowerCase() === n.toLowerCase());
          if (found !== undefined) return row[found];
        }
        return '';
      };

      const liquidadas = rows.filter(row => {
        const status = String(colKey(row, 'Status', 'status', 'STATUS') || '').trim().toLowerCase();
        return status === 'liquidado' || status === 'liquidada';
      });

      if (!liquidadas.length) {
        alert('Nenhuma linha com Status "Liquidado" encontrada no arquivo.');
        return;
      }

      function normVal(v) {
        if (v === null || v === undefined || v === '') return null;
        if (typeof v === 'number') return isNaN(v) ? null : Math.abs(v);
        let s = String(v).replace(/R\$\s*/g,'').trim();
        if (s.includes(',')) { s = s.replace(/\./g,'').replace(',','.'); }
        const n = parseFloat(s);
        return isNaN(n) ? null : Math.abs(n);
      }

      function norm(s) {
        return String(s || '').trim().toLowerCase().replace(/\s+/g,' ').normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      }

      function tipoMatch(tipoArq, tipoCard) {
        const t = String(tipoArq || '').trim().toUpperCase();
        const c = String(tipoCard || '').trim().toLowerCase();
        if (t === 'A') return c === 'aplicacao';
        if (t === 'R') return c === 'resgate_total' || c === 'resgate_parcial';
        return false;
      }

      let matched = 0, notFound = [];

      liquidadas.forEach(row => {
        const rCliente = norm(colKey(row, 'Cliente', 'cliente', 'CLIENTE'));
        const rAtivo   = norm(colKey(row, 'Ativo', 'ativo', 'ATIVO', 'Fundo', 'fundo', 'FUNDO'));
        const rValor   = normVal(colKey(row, 'Valor', 'valor', 'VALOR'));
        const rTipo    = String(colKey(row, 'Tipo', 'tipo', 'TIPO') || '').trim().toUpperCase();

        let foundCard = null, foundFromCol = null, foundBoard = null;

        data.boards.forEach(board => {
          const cols = data.cols[board.id] || [];
          cols.forEach(col => {
            if (col._resgatado) return;
            col.cards.forEach(card => {
              if (foundCard) return;
              const cCliente = norm(card.cliente);
              const cAtivo   = norm(card.fundo);
              const cValor   = normVal(card.value);
              const cTipo    = card.operation || '';

              const clienteOk = cCliente === rCliente;
              const ativoOk   = cAtivo === rAtivo;
              const valorOk   = rValor !== null && cValor !== null && Math.abs(rValor - cValor) < 0.05;
              const tipoOk    = tipoMatch(rTipo, cTipo);

              if (clienteOk && ativoOk && valorOk && tipoOk) {
                foundCard = card;
                foundFromCol = col;
                foundBoard = board;
              }
            });
          });
        });

        if (foundCard && foundFromCol && foundBoard) {
          const cols = data.cols[foundBoard.id];
          const colIdx = cols.findIndex(c => c.id === foundFromCol.id);
          if (colIdx !== -1 && colIdx < cols.length - 1) {
            const nextCol = cols[colIdx + 1];
            const cardIdx = foundFromCol.cards.findIndex(c => c.id === foundCard.id);
            if (cardIdx !== -1) {
              const [moved] = foundFromCol.cards.splice(cardIdx, 1);
              addHistory(moved, foundFromCol.name, nextCol.name);
              nextCol.cards.push(moved);
              matched++;
            }
          }
        } else {
          notFound.push(`${rCliente} | ${rAtivo} | ${rValor} | Tipo: ${rTipo}`);
        }
      });

      render();
      mostrarResultadoUpload(liquidadas.length, matched, notFound);

    } catch(err) {
      alert('Erro ao ler o arquivo: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function mostrarResultadoUpload(total, matched, notFound) {
  let overlay = document.getElementById('uploadResultModal');

  overlay = document.createElement('div');

  const title = document.createElement('div');
  title.style.cssText = 'font-size:15px;font-weight:600;';
  title.textContent = 'Resultado — Liquidações';
  box.appendChild(title);

  const summary = document.createElement('div');
  summary.style.cssText = 'display:flex;gap:10px;';
  summary.innerHTML = `
    <div style="flex:1;background:#e6f4ec;border:1px solid #a8d9b8;border-radius:8px;padding:12px;text-align:center;">
      <div style="font-size:22px;font-weight:700;color:#1e6e42;">${matched}</div>
      <div style="font-size:11px;color:#1e6e42;margin-top:2px;">Cards avançados</div>
    </div>
    <div style="flex:1;background:${notFound.length ? '#fff5f5' : '#f5f5f5'};border:1px solid ${notFound.length ? '#f5b8b8' : '#e2e0d8'};border-radius:8px;padding:12px;text-align:center;">
      <div style="font-size:22px;font-weight:700;color:${notFound.length ? '#b94040' : '#a09d96'};">${notFound.length}</div>
      <div style="font-size:11px;color:${notFound.length ? '#b94040' : '#a09d96'};margin-top:2px;">Não encontrados</div>
    </div>
  `;
  box.appendChild(summary);

  if (notFound.length) {
    const label = document.createElement('div');
    label.style.cssText = 'font-size:11px;font-weight:600;color:#6b6860;text-transform:uppercase;letter-spacing:.05em;';
    label.textContent = 'Não encontrados:';
    box.appendChild(label);

    const list = document.createElement('div');
    list.style.cssText = 'display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;';
    notFound.forEach(item => {
      const row = document.createElement('div');
      row.style.cssText = 'font-size:12px;color:#6b6860;background:#f5f4f0;border-radius:5px;padding:6px 10px;font-family:DM Mono,monospace;';
      row.textContent = item;
      list.appendChild(row);
    });
    box.appendChild(list);
  }

  const btn = document.createElement('button');
  btn.textContent = 'Fechar';
  btn.style.cssText = 'padding:8px;background:#1c1b18;color:#fff;border:none;border-radius:6px;font-size:13px;font-family:DM Sans,sans-serif;cursor:pointer;font-weight:500;';
  btn.onclick = () => overlay.remove();
  box.appendChild(btn);

  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ── UPLOAD DE POSIÇÕES ──
function uploadPosicoes(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

      if (!rows.length) { alert('Arquivo vazio.'); return; }

      const nova = {};
      rows.forEach(row => {
        const cliente = String(row['numero_cliente'] || '').trim();
        const produto = String(row['produto'] || '').trim();
        const banco   = String(row['nome_banco'] || '').trim();
        if (!cliente || !produto) return;
        if (!nova[cliente]) nova[cliente] = [];
        const existe = nova[cliente].find(p => p.produto === produto && p.banco === banco);
        if (!existe) nova[cliente].push({ produto, banco });
      });

      posicoes = nova;

      // Salva no Firebase
      if (window._firebaseSavePosicoes) window._firebaseSavePosicoes(nova);

      const total = Object.keys(nova).length;
      const badge = document.getElementById('posicoesBadge');
      if (badge) {
        badge.style.display = 'inline-block';
        badge.textContent = '📊 ' + total + ' clientes';
        badge.title = 'Atualizado em ' + new Date().toLocaleDateString('pt-BR');
      }
      alert('Base atualizada! ' + total + ' clientes carregados.');
    } catch(err) {
      alert('Erro ao ler arquivo: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

setInterval(checkLiquidacoes, 60000);
</script>
